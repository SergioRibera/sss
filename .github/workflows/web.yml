# Zola docs site (replaces the old oranda + cargo-dist pipeline).
#
# Build paths:
#   - On every PR     -> nix build .#site         (verifies the site compiles)
#   - On push to main -> nix build + deploy gh-pages
#   - On Release done -> fetch the latest release manifest into
#                        docs-site/data/releases.json, then deploy
#
# The site derivation lives at nix/site.nix. It pulls font files from
# the fontsource CDN with pinned hashes, injects the config-reference
# markdown from `nix build .#docs`, and runs `zola build`.

name: Web

on:
  pull_request:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & deploy site
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      # Pull the latest GitHub release manifest into the site's data tree
      # so the install page tabulates real artifacts. Skipped on PRs from
      # forks (no token) and when no release exists yet.
      - name: Fetch latest release manifest
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p docs-site/data
          if gh release view --json tagName,assets > /tmp/release.json 2>/dev/null; then
            jq '{
              tag: .tagName,
              assets: (.assets | map({
                name,
                url,
                size,
                size_human: (
                  if .size >= 1048576 then "\((.size / 1048576) | floor) MB"
                  elif .size >= 1024  then "\((.size / 1024)    | floor) KB"
                  else "\(.size) B" end
                ),
                os: (
                  if   (.name | test("\\.deb$|\\.rpm$|\\.AppImage$|\\.pkg\\.tar\\.zst$|-linux\\.")) then "linux"
                  elif (.name | test("\\.dmg$|-darwin\\.|-macos\\.|\\.rb$"))                       then "macos"
                  else "other" end
                ),
                binary: (
                  if   (.name | test("sss_code")) then "sss_code"
                  elif (.name | test("sss_cli|^sss[-_.]"))  then "sss"
                  else "sss" end
                ),
                format: (
                  if   (.name | test("\\.deb$"))            then "deb"
                  elif (.name | test("\\.rpm$"))            then "rpm"
                  elif (.name | test("\\.AppImage$"))       then "AppImage"
                  elif (.name | test("\\.pkg\\.tar\\.zst$")) then "ArchLinux"
                  elif (.name | test("-linux\\.tar\\.gz$")) then "tar.gz"
                  elif (.name | test("-linux\\.tar\\.zst$")) then "tar.zst"
                  elif (.name | test("\\.dmg$"))            then "dmg"
                  elif (.name | test("-darwin\\.pkg$"))     then "pkg"
                  elif (.name | test("-darwin\\.tar\\.gz$")) then "tar.gz"
                  elif (.name | test("-darwin\\.tar\\.zst$")) then "tar.zst"
                  elif (.name | test("\\.rb$"))             then "brew"
                  else "raw" end
                )
              }))
            }' /tmp/release.json > docs-site/data/releases.json
            echo "Wrote $(jq '.assets | length' docs-site/data/releases.json) assets from $(jq -r .tag docs-site/data/releases.json)"
          else
            echo "No release found; site will render with empty install table"
            echo '{"tag": null, "assets": []}' > docs-site/data/releases.json
          fi

      - name: Build site
        run: nix build .#site -L --print-out-paths

      - name: Stage public/
        run: |
          rm -rf public
          mkdir -p public
          cp -L --no-preserve=mode,ownership -r result/* public/
          touch public/.nojekyll

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}
    steps:
      - name: Deploy
        id: pages
        uses: actions/deploy-pages@v4
