name: Release

# Two parallel tag streams trigger this workflow:
#   v0.1.5            → releases the `sss` binary (sss_cli)
#   sss_code/v0.2.0   → releases the `sss_code` binary
#
# `workflow_dispatch` lets you force a release from a tag too.

on:
  push:
    tags:
      - "v*"
      - "sss_code/v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.5 or sss_code/v0.2.0)."
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Resolve which binary we're releasing + which version, once for all
  # downstream jobs to consume via `needs.plan.outputs.*`.
  plan:
    name: Plan release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.plan.outputs.tag }}
      binary: ${{ steps.plan.outputs.binary }}
      version: ${{ steps.plan.outputs.version }}
      release_name: ${{ steps.plan.outputs.release_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Resolve target
        id: plan
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          if [[ "$tag" == sss_code/v* ]]; then
            binary=sss_code
            version="${tag#sss_code/v}"
            crate=crates/sss_code/Cargo.toml
          else
            binary=sss
            version="${tag#v}"
            crate=crates/sss_cli/Cargo.toml
          fi
          echo "binary=$binary" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release_name=$binary v$version" >> "$GITHUB_OUTPUT"

          crate_ver=$(awk -F\" '/^version = /{print $2; exit}' "$crate")
          if [ "$crate_ver" != "$version" ]; then
            echo "::error::$crate version ($crate_ver) does not match tag ($version)"
            exit 1
          fi

  # Per-runner slice builds. Each runner only emits what it can produce
  # natively (or via pkgsCross on the linux host); the publish job stitches
  # every artifact into a single release.
  bundles:
    name: Build bundles (${{ matrix.label }})
    needs: plan
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-latest
            slice: linux-x86_64
          - label: linux-aarch64
            runner: ubuntu-24.04-arm
            slice: linux-aarch64
          - label: macos-x86_64
            runner: macos-13
            slice: darwin-x86_64
          - label: macos-aarch64
            runner: macos-14
            slice: darwin-aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.plan.outputs.tag }}
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build release slice
        run: |
          attr="release-${{ needs.plan.outputs.binary }}"
          nix build ".#$attr" -L --print-out-paths

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp -L --no-preserve=mode,ownership -r result/* dist/
          # Per-slice INSTALL.md/install.sh — kept as fragments; the
          # publish job merges them into a single unified release.
          mv dist/INSTALL.md "dist/INSTALL-${{ matrix.slice }}.md" 2>/dev/null || true
          mv dist/install.sh "dist/install-${{ matrix.slice }}.sh" 2>/dev/null || true
          mv dist/install.ps1 "dist/install-${{ matrix.slice }}.ps1" 2>/dev/null || true
          mv dist/SHA256SUMS "dist/SHA256SUMS-${{ matrix.slice }}" 2>/dev/null || true
          ls -la dist

      - name: Upload slice
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.slice }}
          path: dist/
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish GitHub Release
    needs: [plan, bundles]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      has_aur: ${{ steps.aur_detect.outputs.has_aur }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.plan.outputs.tag }}
          fetch-depth: 0

      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          pattern: bundles-*
          path: dist
          merge-multiple: true

      - name: Generate unified SHA256SUMS
        working-directory: dist
        run: |
          rm -f SHA256SUMS-*
          find . -maxdepth 1 -type f \
            ! -name 'SHA256SUMS*' \
            ! -name 'INSTALL-*.md' \
            ! -name 'install-*.sh' \
            ! -name 'install-*.ps1' \
            -printf '%P\n' \
            | LC_ALL=C sort \
            | xargs sha256sum -- > SHA256SUMS

      - name: Assemble unified INSTALL.md
        working-directory: dist
        run: |
          {
            echo "## Install ${{ needs.plan.outputs.binary }} v${{ needs.plan.outputs.version }}"
            echo
            echo "Per-platform install scripts and bundle tables below — generated by [nix-bundle-app](https://github.com/SergioRibera/nix-bundle-app)."
            echo
            for fragment in INSTALL-*.md; do
              [ -f "$fragment" ] || continue
              slice="${fragment#INSTALL-}"
              slice="${slice%.md}"
              echo "---"
              echo
              echo "### Slice: \`$slice\`"
              echo
              # Drop the per-slice "## Install <name>" heading; we already
              # printed a unified one above.
              tail -n +2 "$fragment"
              echo
            done
          } > INSTALL.md
          rm -f INSTALL-*.md install-*.sh install-*.ps1
          head -60 INSTALL.md

      - name: Pack AUR layout for downstream workflow
        id: aur_detect
        working-directory: dist
        run: |
          # The archlinux format emits the AUR layout in `aur/` next to
          # the .pkg.tar.zst. The AUR push workflow expects a single
          # uploadable tarball so it doesn't have to figure out individual
          # filenames.
          if [ -d aur ]; then
            pkg="${{ needs.plan.outputs.binary }}-bin"
            ver="${{ needs.plan.outputs.version }}"
            tar czf "${pkg}-${ver}-aur.tar.gz" -C aur .
            echo "has_aur=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_aur=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog with git-cliff
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --current --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: Assemble release body
        run: |
          {
            cat CHANGELOG.md 2>/dev/null || echo "_(no changelog generated)_"
            echo
            cat dist/INSTALL.md
          } > RELEASE_BODY.md
          echo "--- release body preview ---"
          head -120 RELEASE_BODY.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.plan.outputs.tag }}
          name: ${{ needs.plan.outputs.release_name }}
          draft: false
          prerelease: ${{ contains(needs.plan.outputs.tag, '-') }}
          body_path: RELEASE_BODY.md
          fail_on_unmatched_files: true
          # Exclude the `aur/` subdir from the release upload — it's the
          # source layout for the AUR repo, not a user-installable artifact.
          files: |
            dist/*.deb
            dist/*.rpm
            dist/*.pkg.tar.zst
            dist/*.AppImage
            dist/*.tar.gz
            dist/*.tar.xz
            dist/*.tar.zst
            dist/*.dmg
            dist/*.pkg
            dist/*.rb
            dist/*-aur.tar.gz
            dist/INSTALL.md
            dist/SHA256SUMS

  # Pushes Homebrew formula files to SergioRibera/homebrew-tap. Triggered
  # by the AUR push workflow indirectly (both react to a successful
  # Release run via workflow_run). AUR runs in aur.yml, brew runs here so
  # the secrets stay isolated per ecosystem.
  homebrew:
    name: Publish to Homebrew tap
    needs: [plan, publish]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download brew formulas
        uses: actions/download-artifact@v4
        with:
          pattern: bundles-*
          path: dist
          merge-multiple: true

      - name: Collect .rb files
        id: collect
        run: |
          mkdir -p formulas
          shopt -s nullglob
          rbs=(dist/*.rb)
          if [ "${#rbs[@]}" -eq 0 ]; then
            echo "::notice::no .rb files in this release — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          cp "${rbs[@]}" formulas/
          ls -la formulas

      - name: Checkout homebrew-tap
        if: steps.collect.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          repository: SergioRibera/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Commit + push formulas
        if: steps.collect.outputs.skip != 'true'
        working-directory: tap
        env:
          BINARY: ${{ needs.plan.outputs.binary }}
          VERSION: ${{ needs.plan.outputs.version }}
        run: |
          mkdir -p Formula
          cp -f ../formulas/*.rb Formula/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/*.rb
          if git diff --cached --quiet; then
            echo "no formula changes"
            exit 0
          fi
          git commit -m "$BINARY $VERSION"
          git push
