# This content should go in the path ~/.config/sss/config.toml
# These parameters contain the same parameters and format as those of the arguments

# Optional: merge in other TOML files before this one. Paths resolve
# relative to this file's directory (or `~/` to `$HOME`). Missing files
# are skipped with a warning — never an error. Within this list, later
# entries override earlier ones; the importing file overrides all of
# its imports; CLI flags override everything.
# imports = [
#   "themes/dark.toml",
#   "~/.config/sss/local.toml",
# ]

# These are the configurations for sss
[cli]
area = "x,y WxH"
show_cursor = false
current = false
screen = false
screen-id = ""
# Persist the last interactive area selection at
# ${XDG_CONFIG_HOME}/sss/last_selection.toml and pre-seed the selector
# with it the next time `--area` is opened without a value.
remember-last-selection = false

# These are the configurations for sss_code
[code]
extra-syntaxes = ""
line-numbers = true
tab-width = 4
theme = "base16-ocean.dark"
vim-theme = ""
code-background = ""

# These are the configurations for both
[general]
author = "@SergioRibera"
copy = false
fonts = "Hack=12.0"
padding-x = 80
padding-y = 100
radius = 15
save-format = "png"
notify = false
shadow = true
shadow-blur = 50.0
shadow-image = true
window-title = ""

[general.colors]
author = "#000000"
background = "#FFFFFF"
shadow = "#707070"
title = "#FFFFFF"
window-background = ""

[general.window-controls]
enable = false
height = 40
titlebar-padding = 10
width = 120

# OCR pipeline. On by default. The first launch downloads the model files
# for the active tier + language list (see sss_ocr docs); subsequent
# launches reuse the on-disk cache.
[ocr]
enable = true
# auto picks light/standard/heavy based on host cores + RAM.
tier = "auto"
# First entry is the recogniser used at runtime; the rest are pre-cached
# for fast switching. Use "auto" for the general PP-OCRv5 model.
language = ["auto"]
# Enable the formula recognition model (heavy tier only — ~220MB).
formula = false
# Custom on-disk cache. Leave commented to use $XDG_DATA_HOME/sss/models.
# models-dir = "/var/cache/sss/models"
